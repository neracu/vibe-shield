name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: ./build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/vibe-shield-darwin-amd64
            bin/vibe-shield-darwin-arm64
            bin/vibe-shield-linux-amd64
            bin/vibe-shield-windows-amd64.exe
          generate_release_notes: true
